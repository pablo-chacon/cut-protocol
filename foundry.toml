[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
evm_version = "cancun"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true

# Dependency versions (pinned for reproducible mainnet builds)
# Upgrade only intentionally — changing this changes deployed bytecode.
# forge install OpenZeppelin/openzeppelin-contracts@v5.2.0
# Current pin: OpenZeppelin/openzeppelin-contracts v5.2.0

[fuzz]
runs = 256

[profile.mainnet]
# Inherit all defaults. Use this profile for mainnet deployments:
#   FOUNDRY_PROFILE=mainnet forge script script/DeployCUT.s.sol \
#     --rpc-url "$RPC_URL" \
#     --broadcast \
#     --verify \
#     --etherscan-api-key "$ETHERSCAN_API_KEY"
optimizer_runs = 1_000_000
